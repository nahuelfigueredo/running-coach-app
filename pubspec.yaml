name: running_coach_app
description: "Aplicación móvil de gestión de entrenamientos de running entre profesor y alumnos."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # Gestión de estado
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Calendario
  table_calendar: ^3.1.2

  # Gráficos
  fl_chart: ^0.69.0

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.5.0

  # Notificaciones locales
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
